[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-q --strict-markers"
testpaths = ["tests"]
markers = [
  "unit: fast deterministic unit tests",
  "smoke: lightweight functional model checks",
  "regression: baseline-based regression checks",
  "notebook_e2e: full notebook execution via nbconvert (slow; auto in CI unless SKIP_NOTEBOOK_E2E=1)"
]
